name: Build & Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    # Skip auto-bump commits to prevent infinite loop
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Decode release keystore
        run: |
          mkdir -p android/app/keystore
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/keystore/release.keystore
          echo "✅ Release keystore decoded"

      - name: Auto-bump version if tag exists
        run: |
          # Extract version from pubspec.yaml
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
          BUILD=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f2)
          echo "Current version: $VERSION+$BUILD"

          # Check if tag already exists
          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "⚠️ Tag v${VERSION} already exists — auto-bumping patch version"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
            PATCH=$((PATCH + 1))
            NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
            NEW_BUILD=$((BUILD + 1))
            echo "🔼 Bumping: ${VERSION} → ${NEW_VERSION}"

            # Update pubspec.yaml
            sed -i "s/^version: .*/version: ${NEW_VERSION}+${NEW_BUILD}/" pubspec.yaml
            VERSION="$NEW_VERSION"
            BUILD="$NEW_BUILD"

            # Commit and push the version bump
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add pubspec.yaml
            git commit -m "v${NEW_VERSION}: auto-bump version [skip ci]"
            git push
          else
            echo "✅ Tag v${VERSION} is new — no bump needed"
          fi

          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "BUILD_NUMBER=${BUILD}" >> $GITHUB_ENV
          echo "📦 Version: v${VERSION} (build: ${BUILD})"

      - name: Get dependencies
        run: flutter pub get

      - name: Run analysis
        run: flutter analyze --no-fatal-infos

      - name: Build Release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: flutter build apk --release --build-name=${{ env.VERSION }} --build-number=${{ env.BUILD_NUMBER }}

      - name: Rename APK
        run: |
          mkdir -p release-output
          cp build/app/outputs/flutter-apk/app-release.apk release-output/LocalVPN-v${{ env.VERSION }}.apk
          echo "✅ APK renamed to LocalVPN-v${{ env.VERSION }}.apk"
          ls -la release-output/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: LocalVPN-apk
          path: release-output/LocalVPN-*.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: "LocalVPN v${{ env.VERSION }}"
          make_latest: true
          body: |
            ## LocalVPN v${{ env.VERSION }}
            **by Xman Studio**

            Version: `${{ env.VERSION }}` | Build: `${{ env.BUILD_NUMBER }}`

            ### ดาวน์โหลด
            - **LocalVPN-v${{ env.VERSION }}.apk** — ติดตั้งได้เลย

            ### ฟีเจอร์
            - สร้างวง LAN เสมือนผ่านอินเทอร์เน็ต
            - สแกนหาเครือข่ายที่เปิดให้เข้าร่วม
            - ตั้งรหัสเครือข่ายเพื่อความส่วนตัว
            - เห็นอุปกรณ์ทั้งหมดในวง LAN เสมือน
            - ส่งข้อมูลระหว่างอุปกรณ์ได้โดยตรง
            - เข้ารหัสข้อมูลด้วย WireGuard Protocol
            - NAT Traversal — ใช้ได้ทุกเครือข่าย
            - ระบบ License + Auto Update

            ---
            📦 ซื้อ License: https://xman4289.com/localvpn/buy
          draft: false
          prerelease: false
          files: |
            release-output/LocalVPN-*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
